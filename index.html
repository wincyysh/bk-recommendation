<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>The Booklist</title>
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <script type="module" crossorigin src="/bk-recommendation/assets/index-D3Qph_O6.js"></script>
  <link rel="stylesheet" crossorigin href="/bk-recommendation/assets/index-BY57F-sn.css">
</head>

<body>
	<div id="root"></div>
	<script>
		(function (l) {
			if (l.search[1] === 'p') {
				var decoded = l.search.slice(1).split('&').map(function (s) {
					return s.replace(/~and~/g, '&')
				}).filter(function (s) {
					return s.slice(0, 2) === 'p='
				})[0].slice(2).replace(/^\//, '');
				window.history.replaceState(null, null,
					l.pathname + decoded + l.hash
				);
			}
		}(window.location));
	</script>
</body>

</html>
