<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>The Booklist</title>
    <script type="text/javascript">
    // This script checks if we were redirected from 404.html
    (function(l) {
        if (l.search[1] === 'p') {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
        }).filter(function(s) {
            return s.slice(0, 2) === 'p='
        })[0].slice(2);
        if (decoded !== l.pathname.slice(l.pathname.lastIndexOf('/') + 1)) {
            window.history.replaceState(null, null,
            l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1) + decoded +
            (l.hash || '')
            );
        }
        }
    }(window.location));
    </script>
</head>

<body></body>

</html>
